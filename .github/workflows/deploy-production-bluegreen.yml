name: Deploy Production Blue Green

on:
  workflow_dispatch:
    inputs:
      target_slot:
        description: "Blue or green slot to deploy"
        required: true
        default: "green"
        type: choice
        options:
          - blue
          - green

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "OWNER_LOWER=${OWNER_LOWER}"
            echo "API_IMAGE=ghcr.io/${OWNER_LOWER}/vowgrid-api-api:production-${{ github.sha }}"
            echo "WEB_IMAGE=ghcr.io/${OWNER_LOWER}/vowgrid-api-web:production-${{ github.sha }}"
            echo "TARGET_SLOT=${{ github.event.inputs.target_slot }}"
          } >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}

      - name: Copy blue green assets
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_DEPLOY_USER }}@${{ secrets.PRODUCTION_DEPLOY_HOST }} "mkdir -p '${{ secrets.PRODUCTION_DEPLOY_PATH }}/infra'"
          scp -o StrictHostKeyChecking=no infra/docker-compose.bluegreen.yml infra/Caddyfile.bluegreen infra/.env.bluegreen.example infra/api.env.example infra/web.env.example infra/scripts/deploy-bluegreen.sh ${{ secrets.PRODUCTION_DEPLOY_USER }}@${{ secrets.PRODUCTION_DEPLOY_HOST }}:${{ secrets.PRODUCTION_DEPLOY_PATH }}/infra/

      - name: Deploy selected slot and switch traffic
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_DEPLOY_USER }}@${{ secrets.PRODUCTION_DEPLOY_HOST }} "
            set -eu && \
            cd '${{ secrets.PRODUCTION_DEPLOY_PATH }}' && \
            test -f infra/.env.bluegreen && \
            test -f infra/api.env && \
            test -f infra/web.env && \
            chmod +x infra/deploy-bluegreen.sh && \
            export VOWGRID_API_IMAGE='${{ env.API_IMAGE }}' && \
            export VOWGRID_WEB_IMAGE='${{ env.WEB_IMAGE }}' && \
            export TARGET_SLOT='${{ env.TARGET_SLOT }}' && \
            ./infra/deploy-bluegreen.sh
          "

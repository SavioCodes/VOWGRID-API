name: CI

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  quality-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare environment files
        run: |
          cp apps/api/.env.development.example apps/api/.env
          cp apps/web/.env.development.example apps/web/.env.local
          cp infra/.env.development.example infra/.env

      - name: Start local infrastructure
        run: pnpm docker:up

      - name: Render observability compose config
        run: pnpm docker:obs:config

      - name: Render release compose config
        run: pnpm docker:release:config

      - name: Apply migrations
        run: pnpm migrate

      - name: Seed database
        run: pnpm seed

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm test:integration

      - name: Coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage

      - name: Stop infrastructure
        if: always()
        run: pnpm docker:down

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Prepare environment files
        run: |
          cp apps/api/.env.development.example apps/api/.env
          cp apps/web/.env.development.example apps/web/.env.local
          cp infra/.env.development.example infra/.env

      - name: Start local infrastructure
        run: pnpm docker:up

      - name: Apply migrations
        run: pnpm migrate

      - name: Seed database
        run: pnpm seed

      - name: Run E2E suite
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Stop infrastructure
        if: always()
        run: pnpm docker:down

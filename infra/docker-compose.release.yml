name: vowgrid

services:
  caddy:
    image: caddy:2.9-alpine
    container_name: vowgrid-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      VOWGRID_PRIMARY_DOMAIN: ${VOWGRID_PRIMARY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - vowgrid_caddy_data:/data
      - vowgrid_caddy_config:/config

  postgres:
    image: postgres:16-alpine
    container_name: vowgrid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${VOWGRID_POSTGRES_USER}
      POSTGRES_PASSWORD: ${VOWGRID_POSTGRES_PASSWORD}
      POSTGRES_DB: ${VOWGRID_POSTGRES_DB}
    volumes:
      - vowgrid_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VOWGRID_POSTGRES_USER} -d ${VOWGRID_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vowgrid-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - vowgrid_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${VOWGRID_API_IMAGE}
    container_name: vowgrid-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ${VOWGRID_API_ENV_FILE:-../apps/api/.env.production.example}
    environment:
      DATABASE_URL: ${VOWGRID_DATABASE_URL:-postgresql://${VOWGRID_POSTGRES_USER}:${VOWGRID_POSTGRES_PASSWORD}@postgres:5432/${VOWGRID_POSTGRES_DB}?schema=public}
      REDIS_URL: ${VOWGRID_REDIS_URL:-redis://redis:6379}
      APP_WEB_BASE_URL: ${VOWGRID_WEB_BASE_URL}
      MERCADO_PAGO_RETURN_URL: ${VOWGRID_WEB_BASE_URL}/app/billing
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/v1/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    image: ${VOWGRID_WEB_IMAGE}
    container_name: vowgrid-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ${VOWGRID_WEB_ENV_FILE:-../apps/web/.env.production.example}
    environment:
      VOWGRID_API_BASE_URL: http://api:4000
      VOWGRID_WEB_BASE_URL: ${VOWGRID_WEB_BASE_URL}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.55.1
    container_name: vowgrid-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.release.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - vowgrid_prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${VOWGRID_PROMETHEUS_PORT:-9090}:9090"

  alertmanager:
    profiles: ["observability"]
    image: prom/alertmanager:v0.27.0
    container_name: vowgrid-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - vowgrid_alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:${VOWGRID_ALERTMANAGER_PORT:-9093}:9093"

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.5.2
    container_name: vowgrid-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${VOWGRID_GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${VOWGRID_GRAFANA_PASSWORD:-vowgrid_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - vowgrid_grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${VOWGRID_GRAFANA_PORT:-3001}:3000"

volumes:
  vowgrid_caddy_data:
  vowgrid_caddy_config:
  vowgrid_postgres_data:
  vowgrid_redis_data:
  vowgrid_prometheus_data:
  vowgrid_alertmanager_data:
  vowgrid_grafana_data:
